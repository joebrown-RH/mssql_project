---
- name: Install SQL Server using the sql_install role
  hosts: all
  gather_facts: true

  tasks:
    - name: Download SQL Server 2022 ISO to target
      ansible.windows.win_get_url:
        url: https://download.microsoft.com/download/3/8/d/38de7036-2433-4207-8eae-06e247e17b25/SQLServer2022-x64-ENU-Dev.iso
        dest: C:\temp\SQLServer2022-x64-ENU-Dev.iso

    - name: Import the sql_install role
      ansible.builtin.import_role:
        name: automatesql.mssql.sql_install
